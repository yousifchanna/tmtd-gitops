apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: test-app
  namespace: argocd

spec:
  source:
    repoURL: https://github.com/yousifchanna/tmtd-gitops/blob/main/app.yaml
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
