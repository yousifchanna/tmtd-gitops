apiVersion: apps/v1
kind: Deployment

metadata:
  name: test-app
  namespace: default

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: test

  template:
    metadata:
      labels:
        app: test

    spec:
      imagePullSecrets:
      - name: harbor-secret

      containers:
      - name: test
        image: 192.168.1.133/tmtd/tmtd-test:19

        ports:
        - containerPort: 80

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
